<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TWIST — word anagram arcade</title>
<meta name="description" content="Unscramble seven letters into as many words as you can before the clock runs out. Find the full word to earn time and race on. No ads, no accounts.">
<meta name="theme-color" content="#0B1B22">
<style>
:root{
  --bg:#0B1B22;--panel:#10262F;--panel2:#143039;--line:#1D3A45;--ink:#D9E7E5;
  --dim:#7A99A0;--faint:#42606B;--amber:#F2A93B;--hit:#3FD07E;--miss:#F2585B;
  --tile:#1B3B47;--tileface:#F4E9D0;--tileink:#123039;
  --mono:ui-monospace,'Cascadia Mono','SF Mono',Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:var(--bg);color:var(--ink);font-family:var(--sans);
  min-height:100%;overflow-x:hidden;
  background-image:radial-gradient(ellipse 900px 520px at 50% -12%,#123039 0%,transparent 60%);
  -webkit-user-select:none;user-select:none;
}
.wrap{max-width:640px;margin:0 auto;padding:14px 14px calc(20px + env(safe-area-inset-bottom))}
a{color:var(--hit);text-decoration:none}
.top{display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line);padding-bottom:12px}
.brand h1{margin:0;font-size:1.9rem;letter-spacing:.32em;font-weight:800;padding-left:.32em}
.brand .k{font-family:var(--mono);font-size:.6rem;letter-spacing:.22em;color:var(--faint);text-transform:uppercase;margin-top:3px}
.back{font-family:var(--mono);font-size:.66rem;color:var(--dim);border-bottom:1px solid var(--faint);padding-bottom:1px}

.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 6px;text-align:center}
.stat .lab{font-family:var(--mono);font-size:.56rem;letter-spacing:.14em;color:var(--faint);text-transform:uppercase}
.stat .val{font-family:var(--mono);font-size:1.15rem;font-weight:700;margin-top:3px;color:var(--ink)}
.stat.time .val{color:var(--amber)}
.stat.time.low .val{color:var(--miss);animation:blip .8s steps(2) infinite}
@keyframes blip{50%{opacity:.35}}
.clockbar{height:5px;background:#071319;border-radius:999px;overflow:hidden;margin:-4px 0 14px}
.clockbar i{display:block;height:100%;width:100%;background:linear-gradient(90deg,var(--hit),var(--amber));transition:width .5s linear}
.clockbar.low i{background:linear-gradient(90deg,var(--amber),var(--miss))}

.msg{min-height:22px;text-align:center;font-family:var(--mono);font-size:.82rem;letter-spacing:.03em;color:var(--dim);margin-bottom:6px;transition:color .15s}
.msg.good{color:var(--hit)}
.msg.bad{color:var(--miss)}
.msg b{color:var(--amber)}

.entry{display:flex;justify-content:center;align-items:center;gap:6px;min-height:60px;background:var(--panel);border:1px dashed var(--line);border-radius:14px;padding:10px;margin-bottom:12px}
.entry.shake{animation:shake .32s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.entry .placeholder{color:var(--faint);font-family:var(--mono);font-size:.8rem;letter-spacing:.1em}

.rack{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;min-height:56px}
.tile{
  width:46px;height:52px;border-radius:10px;
  background:linear-gradient(180deg,#FBF3DE,#EAD9B4);
  color:var(--tileink);border:1px solid rgba(0,0,0,.25);
  display:grid;place-items:center;font-weight:800;font-size:1.5rem;
  box-shadow:0 4px 0 rgba(0,0,0,.28),inset 0 2px 0 rgba(255,255,255,.5);
  cursor:pointer;transition:transform .08s,opacity .12s;position:relative;
}
.tile:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.28)}
.tile.used{opacity:0;pointer-events:none}
.tile.mini{width:34px;height:40px;font-size:1.15rem;border-radius:8px;box-shadow:0 3px 0 rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.5)}
.tile .pt{position:absolute;right:4px;bottom:2px;font-size:.5rem;font-weight:700;opacity:.55;font-family:var(--mono)}

.controls{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.btn{
  background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:12px;padding:12px 4px;font-weight:700;font-size:.8rem;letter-spacing:.06em;
  cursor:pointer;font-family:var(--sans);transition:border-color .15s,background .15s;
}
.btn:hover,.btn:focus-visible{border-color:var(--amber);outline:none}
.btn:active{background:#183742}
.btn.enter{background:linear-gradient(180deg,#2c6f4c,#1f5238);border-color:#2f7a4d;color:#eafff2}
.btn.enter:hover{border-color:var(--hit)}

.board{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px}
.board .bhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.board .bhead b{font-size:.9rem;letter-spacing:.04em}
.board .bhead span{font-family:var(--mono);font-size:.66rem;color:var(--dim)}
.lenrow{margin-bottom:10px}
.lenrow:last-child{margin-bottom:0}
.lenrow .lt{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;margin-bottom:5px}
.words{display:flex;flex-wrap:wrap;gap:5px}
.wd{
  font-family:var(--mono);font-size:.74rem;letter-spacing:.16em;
  background:#0C1F26;border:1px solid var(--line);border-radius:7px;
  padding:4px 8px;color:var(--faint);min-width:1ch;
}
.wd.found{color:var(--tileface);border-color:#2f5563;background:#12333d;letter-spacing:.1em;text-transform:uppercase}
.wd.pop{animation:pop .3s}
.wd.bonus{border-color:var(--amber);color:var(--amber)}
@keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.15)}100%{transform:scale(1)}}

.footer{margin-top:18px;text-align:center}
.footer .prov{font-family:var(--mono);font-size:.6rem;color:var(--faint);line-height:1.8;letter-spacing:.04em}
.footer .prov b{color:var(--dim)}
.linkrow{margin-top:8px;font-family:var(--mono);font-size:.64rem}
.linkrow a{color:var(--dim);border-bottom:1px solid var(--faint)}
.mute{background:none;border:none;color:var(--faint);font-size:1rem;cursor:pointer;padding:4px 6px}
.mute:hover{color:var(--dim)}

/* overlay */
.overlay{position:fixed;inset:0;background:rgba(5,14,18,.82);backdrop-filter:blur(4px);display:none;place-items:center;padding:20px;z-index:20}
.overlay.open{display:grid}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px 22px;max-width:440px;width:100%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.card h2{margin:0 0 4px;font-size:1.6rem;letter-spacing:.14em}
.card .tagl{color:var(--dim);font-size:.9rem;line-height:1.55;margin:0 0 16px}
.card .how{text-align:left;background:#0C1F26;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:0 0 16px}
.card .how li{color:var(--dim);font-size:.82rem;line-height:1.7;margin-left:-8px}
.card .how b{color:var(--ink)}
.card .big{font-family:var(--mono);font-size:2.4rem;font-weight:800;color:var(--amber);margin:4px 0}
.card .sub{font-family:var(--mono);font-size:.74rem;color:var(--dim);margin-bottom:16px;line-height:1.7}
.card .sub .hl{color:var(--hit)}
.card .missed{text-align:left;max-height:150px;overflow:auto;background:#0C1F26;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:0 0 16px}
.card .missed .lt{font-family:var(--mono);font-size:.58rem;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;margin:6px 0 3px}
.card .missed .words{gap:4px}
.card .missed .wd{font-size:.68rem}
.play{width:100%;background:linear-gradient(180deg,#2c6f4c,#1f5238);border:1px solid #2f7a4d;color:#eafff2;border-radius:14px;padding:14px;font-weight:800;font-size:1rem;letter-spacing:.08em;cursor:pointer}
.play:hover{border-color:var(--hit)}
.play.sec{background:var(--panel2);border-color:var(--line);color:var(--ink);margin-top:8px;font-size:.86rem}

@media(min-width:560px){
  .tile{width:52px;height:58px;font-size:1.7rem}
  .brand h1{font-size:2.2rem}
}
@media(max-width:360px){
  .hud{grid-template-columns:repeat(2,1fr)}
  .tile{width:42px;height:48px;font-size:1.35rem}
}
</style>
</head>

<div class="wrap">
  <div class="top">
    <div class="brand"><h1>TWIST</h1><div class="k">Word Anagram Arcade</div></div>
    <div style="text-align:right">

  <div class="rack" id="rack"></div>

  <div class="controls">
    <button class="btn" id="del">⌫ DEL</button>
    <button class="btn" id="clear">CLEAR</button>
    <button class="btn" id="shuffle">↻ MIX</button>
    <button class="btn enter" id="enter">ENTER</button>
  </div>

  <div class="board">
    <div class="bhead"><b>Words found</b><span id="progress">0 / 0</span></div>
    <div id="lengths"></div>
  </div>

  <div class="footer">
    <div class="prov"><b>Created by</b> Claude Code · Anthropic &nbsp;·&nbsp; <b>Spark</b> Jaron K. Bragg</div>

</div>

<div class="overlay open" id="overlay">

const WORDS = new Set(DICT_STR.split(" "));
const SCORES = {3:100,4:300,5:600,6:1000,7:2000};
const START_TIME = 90, WORD_TIME = 2, ROUND_TIME = 25, MAX_TIME = 120;

const $ = id => document.getElementById(id);
const el = {

// ---- audio (tiny WebAudio blips, mute persisted) ----
let muted = localStorage.getItem("twist_muted") === "1";
let actx = null;
function beep(freq, dur, type, gain){
  if(muted) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type||"sine"; o.frequency.value = freq;
    g.gain.value = gain||0.05;
    o.connect(g); g.connect(actx.destination);
    const t = actx.currentTime;
    g.gain.setValueAtTime(gain||0.05, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + (dur||0.12));
    o.start(t); o.stop(t + (dur||0.12));
  }catch(e){}
}
const sfx = {
  found:(len)=>{ beep(360 + len*60, 0.12, "triangle", 0.06); },
  big:()=>{ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.16,"triangle",0.06), i*70)); },
  bad:()=>{ beep(150, 0.16, "sawtooth", 0.04); },
  dupe:()=>{ beep(300, 0.08, "sine", 0.03); },
  tick:()=>{ beep(880, 0.05, "square", 0.03); }
};
function renderMute(){ el.mute.textContent = muted ? "🔇" : "🔊"; }
el.mute.addEventListener("click", ()=>{
  muted = !muted; localStorage.setItem("twist_muted", muted?"1":"0"); renderMute();
});
renderMute();

// ---- helpers ----
function countLetters(w){ const c={}; for(const ch of w) c[ch]=(c[ch]||0)+1; return c; }
function canForm(word, rc){
  const wc = countLetters(word);
  for(const ch in wc){ if((rc[ch]||0) < wc[ch]) return false; }
  return true;
}
function solutionsFor(seed){
  const rc = countLetters(seed);
  const byLen = {3:[],4:[],5:[],6:[],7:[]};
  for(const w of WORDS){
    const L = w.length;
    if(L>=3 && L<=7 && canForm(w, rc)) byLen[L].push(w);
  }
  for(const k in byLen) byLen[k].sort();
  return byLen;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// pick a seed that has at least one 7-letter solution and decent depth
function pickSeed(prev){
  for(let tries=0; tries<40; tries++){
    const seed = SEEDS[Math.floor(Math.random()*SEEDS.length)];
    if(seed === prev) continue;
    const sol = solutionsFor(seed);
    if(sol[7].length >= 1) return {seed, sol};
  }
  const seed = SEEDS[0];
  return {seed, sol:solutionsFor(seed)};
}

// ---- game lifecycle ----
function newGame(){
  const best = +(localStorage.getItem("twist_best")||0);
  const bestRound = +(localStorage.getItem("twist_bestround")||1);
  G = {
    score:0, round:0, time:START_TIME, best, bestRound,
    combo:0, seed:"", sol:null, found:new Set(), totalThisRound:0,
    entry:[], rack:[], active:true, prevSeed:null
  };
  loadRound();
  closeOverlay();
  startTicker();
  updateHud();
}
function loadRound(){
  G.round++;
  const {seed, sol} = pickSeed(G.prevSeed);
  G.prevSeed = seed;
  G.seed = seed; G.sol = sol;
  G.solSet = new Set(); for(const k in sol) sol[k].forEach(w=>G.solSet.add(w));
  G.found = new Set();
  G.totalThisRound = G.solSet.size;
  G.entry = [];
  buildRack(seed);
  renderBoard();
  renderRack();
  renderEntry();
  updateHud();
}
function buildRack(seed){
  const letters = shuffle(seed.split(""));
  G.rack = letters.map((ch,i)=>({ch, id:i, used:false}));
}
function startTicker(){
  stopTicker();
  ticker = setInterval(()=>{
    if(!G.active) return;
    G.time--;
    if(G.time <= 5 && G.time > 0) sfx.tick();
    if(G.time <= 0){ G.time = 0; updateHud(); gameOver(); return; }
    updateHud();
  }, 1000);
}
function stopTicker(){ if(ticker){ clearInterval(ticker); ticker=null; } }

// ---- input ----
function addLetterById(id){
  const t = G.rack.find(x=>x.id===id);
  if(!t || t.used) return;
  t.used = true; G.entry.push(id);
  renderRack(); renderEntry();
}
function addLetterByChar(ch){
  const t = G.rack.find(x=>x.ch===ch && !x.used);
  if(!t) return;
  t.used = true; G.entry.push(t.id);
  renderRack(); renderEntry();
}
function removeAt(pos){
  const id = G.entry.splice(pos,1)[0];
  const t = G.rack.find(x=>x.id===id); if(t) t.used=false;
  renderRack(); renderEntry();
}
function delLast(){ if(G.entry.length) removeAt(G.entry.length-1); }
function clearEntry(){
  G.entry.forEach(id=>{ const t=G.rack.find(x=>x.id===id); if(t) t.used=false; });
  G.entry = []; renderRack(); renderEntry();
}
function mixRack(){ shuffle(G.rack); renderRack(); flash(""); }

function currentWord(){ return G.entry.map(id=>G.rack.find(x=>x.id===id).ch).join(""); }

function submit(){
  if(!G.active) return;
  const w = currentWord();
  if(w.length < 3){ flash("Words need 3+ letters", "bad"); shakeEntry(); return; }
  if(G.found.has(w)){ flash("Already found: "+w.toUpperCase(), ""); sfx.dupe(); clearEntry(); return; }
  if(!G.solSet.has(w)){
    flash("Not in word list", "bad"); sfx.bad(); shakeEntry();
    G.combo = 0; clearEntry(); updateHud(); return;
  }
  // valid new word
  G.found.add(w);
  G.combo++;
  const mult = 1 + Math.min(G.combo-1, 10) * 0.1;   // caps at ×2
  const base = SCORES[w.length];
  const pts = Math.round(base * mult);
  G.score += pts;
  G.time = Math.min(G.time + WORD_TIME, MAX_TIME);

  const isSeven = w.length === 7;
  if(isSeven) sfx.big(); else sfx.found(w.length);

  revealWord(w);
  const comboTxt = G.combo>1 ? `  (combo ×${G.combo} → ${mult.toFixed(1)}×)` : "";
  flash(`+${pts}  ${w.toUpperCase()}${comboTxt}`, "good");
  clearEntry();

  // round completion: any 7-letter word found
  const solvedSeven = G.sol[7].some(sw=>G.found.has(sw));
  const perfect = G.found.size === G.totalThisRound;

  if(perfect){
    const bonus = 1500 + G.round*250;
    G.score += bonus;
    G.time = Math.min(G.time + ROUND_TIME + 10, MAX_TIME);
    updateHud();
    flash(`PERFECT ROUND! +${bonus} — every word found`, "good");
    setTimeout(nextRound, 900);
    return;
  }
  if(isSeven && G.sol[7].filter(sw=>G.found.has(sw)).length === 1){
    // first seven-letter word this round: award time + advance shortly
    const bonus = 500 + G.round*100;
    G.score += bonus;
    G.time = Math.min(G.time + ROUND_TIME, MAX_TIME);
    updateHud();
    flash(`FULL WORD! +${bonus} & +${ROUND_TIME}s — next round`, "good");
    setTimeout(nextRound, 1000);
    return;
  }
  updateHud();
}

function nextRound(){
  if(!G.active) return;
  loadRound();
  flash("New letters — find the 7-letter word", "");
}

function gameOver(){
  G.active = false;
  stopTicker();
  const newBest = G.score > G.best;
  const newRoundBest = G.round > G.bestRound;
  if(newBest) localStorage.setItem("twist_best", G.score);
  if(newRoundBest) localStorage.setItem("twist_bestround", G.round);

  // missed words for this round
  const missed = {};
  [7,6,5,4,3].forEach(L=>{
    const m = G.sol[L].filter(w=>!G.found.has(w));
    if(m.length) missed[L]=m;
  });
  let missedHtml = "";
  for(const L of [7,6,5,4,3]){
    if(!missed[L]) continue;
    missedHtml += `<div class="lt">${L} letters — ${missed[L].length} missed</div><div class="words">`+
      missed[L].map(w=>`<span class="wd found">${w}</span>`).join("")+`</div>`;
  }
  if(!missedHtml) missedHtml = `<div class="lt">You cleared every word — spotless.</div>`;

  el.card.innerHTML = `
    <h2>TIME</h2>
    <p class="tagl">The clock hit zero on round ${G.round}.</p>
    <div class="big">${G.score.toLocaleString()}</div>
    <div class="sub">
      ${newBest ? '<span class="hl">★ NEW BEST SCORE</span><br>' : `best ${G.best.toLocaleString()}<br>`}
      reached round ${G.round}${newRoundBest?' <span class="hl">(record)</span>':''} · found ${G.found.size} of ${G.totalThisRound} this round
    </div>
    <div class="missed"><div class="lt" style="margin-top:0">Words you missed (${G.seed.toUpperCase()})</div>${missedHtml}</div>
    <button class="play" id="againBtn">PLAY AGAIN</button>
  `;
  openOverlay();
  $("againBtn").addEventListener("click", newGame);
}

// ---- rendering ----
function updateHud(){
  el.score.textContent = G.score.toLocaleString();
  el.round.textContent = G.round;
  el.combo.textContent = "×" + Math.max(1, G.combo);
  el.time.textContent = G.time;
  const pct = Math.max(0, Math.min(100, (G.time/MAX_TIME)*100));
  el.clockbar.querySelector("i").style.width = pct + "%";
  const low = G.time <= 15;
  el.timeStat.classList.toggle("low", low);
  el.clockbar.classList.toggle("low", low);
  el.progress.textContent = `${G.found.size} / ${G.totalThisRound}`;
}
function renderRack(){
  el.rack.innerHTML = "";
  G.rack.forEach(t=>{
    const d = document.createElement("div");
    d.className = "tile" + (t.used ? " used" : "");
    d.textContent = t.ch.toUpperCase();
    d.addEventListener("click", ()=>addLetterById(t.id));
    el.rack.appendChild(d);
  });
}
function renderEntry(){
  el.entry.innerHTML = "";
  if(G.entry.length === 0){
    const s = document.createElement("span");
    s.className = "placeholder"; s.textContent = "tap letters to build a word";
    el.entry.appendChild(s); return;
  }
  G.entry.forEach((id,pos)=>{
    const ch = G.rack.find(x=>x.id===id).ch;
    const d = document.createElement("div");
    d.className = "tile mini";
    d.textContent = ch.toUpperCase();
    d.addEventListener("click", ()=>removeAt(pos));
    el.entry.appendChild(d);
  });
}
function renderBoard(){
  el.lengths.innerHTML = "";
  [7,6,5,4,3].forEach(L=>{
    const list = G.sol[L];
    if(!list.length) return;
    const row = document.createElement("div");
    row.className = "lenrow";
    const lt = document.createElement("div");
    lt.className = "lt";
    lt.textContent = `${L} letters · ${list.length}`;
    row.appendChild(lt);
    const words = document.createElement("div");
    words.className = "words";
    list.forEach(w=>{
      const s = document.createElement("span");
      s.className = "wd" + (L===7 ? " bonus" : "");
      s.dataset.w = w;
      s.textContent = "•".repeat(w.length);
      words.appendChild(s);
    });
    row.appendChild(words);
    el.lengths.appendChild(row);
  });
}
function revealWord(w){
  const node = el.lengths.querySelector(`.wd[data-w="${w}"]`);
  if(node){
    node.textContent = w;
    node.classList.add("found","pop");
    setTimeout(()=>node.classList.remove("pop"), 320);
  }
  updateHud();
}
let flashTimer = null;

function shakeEntry(){

    ${best ? `<div class="sub">best ${best.toLocaleString()} · furthest round ${bestRound}</div>` : ''}
    <button class="play" id="startBtn">START</button>
  `;
  openOverlay();
  $("startBtn").addEventListener("click", newGame);
}

// ---- global controls & keyboard ----
$("enter").addEventListener("click", submit);
$("del").addEventListener("click", delLast);
$("clear").addEventListener("click", clearEntry);
$("shuffle").addEventListener("click", mixRack);

document.addEventListener("keydown", (e)=>{
  if(el.overlay.classList.contains("open")){
    if(e.key === "Enter"){ const b = el.card.querySelector("button"); if(b) b.click(); }
    return;
  }
  if(e.key === "Enter"){ e.preventDefault(); submit(); }
  else if(e.key === "Backspace"){ e.preventDefault(); delLast(); }
  else if(e.key === " "){ e.preventDefault(); mixRack(); }
  else if(e.key === "Escape"){ clearEntry(); }
  else if(/^[a-zA-Z]$/.test(e.key)){ addLetterByChar(e.key.toLowerCase()); }
});

showStart();
})();
</script>
</body>
</html>
