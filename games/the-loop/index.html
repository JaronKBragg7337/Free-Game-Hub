<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Loop — systems balancing game</title>
<meta name="description" content="Balance energy, industry, research, society, and ecology for 40 turns. Every choice helps one system and stresses another.">
<meta name="theme-color" content="#06141A">
<style>
:root{--bg:#06141A;--panel:#0D2028;--panel2:#102A35;--line:#1B4655;--ink:#E5F4F2;--dim:#8CAAB0;--faint:#4E6E78;--gold:#F2B84B;--green:#38E078;--blue:#38A7FF;--red:#FF5C5C;--mono:ui-monospace,'Cascadia Mono','SF Mono',Menlo,Consolas,monospace;--sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh}body{background-image:radial-gradient(circle at 50% -10%,#123340 0%,transparent 48%),linear-gradient(180deg,#06141A,#071017)}.wrap{width:100%;max-width:760px;margin:0 auto;padding:18px 14px 44px}header{border-bottom:1px solid var(--line);padding:10px 2px 16px;margin-bottom:14px}.kicker{font-family:var(--mono);font-size:.68rem;letter-spacing:.24em;color:var(--gold);text-transform:uppercase}h1{margin:8px 0 6px;font-size:clamp(2rem,10vw,4rem);letter-spacing:.08em;line-height:.95}.sub{margin:0;color:var(--dim);font-size:.95rem;line-height:1.55}.topbar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.chip{background:rgba(13,32,40,.86);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}.chip span{display:block;font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;color:var(--dim);text-transform:uppercase}.chip b{display:block;font-family:var(--mono);font-size:1.2rem;margin-top:3px}.panel{background:rgba(13,32,40,.88);border:1px solid var(--line);border-radius:18px;padding:14px;margin:14px 0;box-shadow:0 18px 70px rgba(0,0,0,.22)}.systems{display:grid;gap:10px}.row{display:grid;grid-template-columns:92px 1fr 44px;gap:10px;align-items:center}.name{font-weight:800;font-size:.78rem;letter-spacing:.06em}.bar{height:16px;background:#071017;border:1px solid #244D59;border-radius:999px;overflow:hidden}.fill{height:100%;width:50%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--blue));transition:width .25s}.val{font-family:var(--mono);font-weight:800;text-align:right}.warning{color:var(--red)}.event{border-left:3px solid var(--gold);padding:4px 0 4px 12px;color:var(--dim);font-size:.9rem;line-height:1.5}.event b{color:var(--ink)}.actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}.btn{width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:14px;padding:13px 14px;font-weight:800;font-size:.92rem;cursor:pointer;line-height:1.35}.btn small{display:block;color:var(--dim);font-weight:600;margin-top:4px}.btn:hover,.btn:focus-visible{border-color:var(--gold);outline:none}.btn:disabled{opacity:.45;cursor:default}.log{font-family:var(--mono);font-size:.72rem;color:var(--dim);line-height:1.55;max-height:none;overflow:visible}.log div{border-top:1px solid rgba(255,255,255,.06);padding:8px 0}.timeline div:nth-child(odd){color:#A7C5CB}.footerBtns{display:flex;gap:8px;margin-top:12px}.footerBtns .btn{text-align:center;flex:1}.endPanel{display:none;text-align:center;border-color:#246274}.endPanel.open{display:block}.grade{font-size:2.3rem}.endPanel h2{margin:8px 0 6px;font-size:1.8rem}.endPanel p{color:var(--dim);line-height:1.55;margin:0 auto 12px;max-width:520px}.score{font-family:var(--mono);font-size:1.9rem;color:var(--gold);font-weight:900;margin:8px 0 12px}.endBtns{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px}.endBtns .btn{text-align:center}.back{display:inline-block;margin-top:12px;color:var(--dim);font-family:var(--mono);font-size:.72rem;text-decoration:none;border-bottom:1px solid var(--faint)}@media(min-width:680px){.actions{grid-template-columns:1fr 1fr}.row{grid-template-columns:120px 1fr 50px}.wrap{padding-top:28px}.endBtns{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
<header><div class="kicker">Heartbeat Observatory Prototype</div><h1>THE LOOP</h1><p class="sub">Five systems are tied together. Every action strengthens one part and stresses another. Survive 40 turns without letting any system collapse.</p><a class="back" href="../../">← Free Game Hub</a></header>
<div class="topbar"><div class="chip"><span>Turn</span><b id="turn">1/40</b></div><div class="chip"><span>Stability</span><b id="stability">50</b></div><div class="chip"><span>Best</span><b id="best">0</b></div></div>
<section class="panel systems" id="systems"></section>
<section class="panel endPanel" id="endPanel"><div class="grade" id="grade">◎</div><h2 id="endTitle">Loop closed</h2><p id="endText"></p><div class="score" id="finalScore"></div><div class="endBtns"><button class="btn" id="review">Review Timeline</button><button class="btn" id="again">Run Another Loop</button><button class="btn" id="shareTop">Share</button></div></section>
<section class="panel" id="decisionPanel"><div class="event" id="event"></div><div class="actions" id="actions"></div></section>
<section class="panel" id="timeline"><b>System timeline</b><div class="log timeline" id="log"></div><div class="footerBtns"><button class="btn" id="restart">Restart</button><button class="btn" id="share">Share</button></div></section>
</div>
<script>
(function(){
const MAX=40,names=['Energy','Industry','Research','Society','Ecology'];
const icons={Energy:'⚡',Industry:'🏭',Research:'📚',Society:'🌐',Ecology:'🌱'};
const events=[{t:'Heat wave stresses the grid.',d:{Energy:-7,Ecology:-4,Society:-2}},{t:'A manufacturing shortage appears.',d:{Industry:-7,Research:-2}},{t:'Students demand better tools.',d:{Research:-5,Society:-3}},{t:'Pollution reports spread online.',d:{Ecology:-7,Society:-3}},{t:'Automation improves output but scares workers.',d:{Industry:5,Society:-6,Energy:-3}},{t:'A public trust crisis hits the observatory.',d:{Society:-8,Research:-3}},{t:'New battery chemistry leaks from a lab.',d:{Energy:5,Research:3,Industry:-2}},{t:'Drought threatens food and cooling systems.',d:{Ecology:-6,Energy:-4,Society:-2}},{t:'Open-source contributors arrive.',d:{Research:5,Society:3,Energy:-2}},{t:'Old infrastructure starts failing.',d:{Energy:-5,Industry:-5}}];
const actions=[{n:'Build Solar Backbone',s:'Energy +12 · Ecology +4 · Industry -5',d:{Energy:12,Ecology:4,Industry:-5}},{n:'Expand Factory Output',s:'Industry +13 · Energy -7 · Ecology -6',d:{Industry:13,Energy:-7,Ecology:-6}},{n:'Fund Research Loop',s:'Research +13 · Energy -4 · Industry -3',d:{Research:13,Energy:-4,Industry:-3}},{n:'Public Education Push',s:'Society +12 · Research +3 · Industry -4',d:{Society:12,Research:3,Industry:-4}},{n:'Ecology Repair',s:'Ecology +14 · Industry -6 · Energy -3',d:{Ecology:14,Industry:-6,Energy:-3}},{n:'Automate Carefully',s:'Industry +8 · Research +5 · Society -5',d:{Industry:8,Research:5,Society:-5}},{n:'Slow Down and Stabilize',s:'Weak systems +7 · strong systems -3',special:'stabilize'},{n:'Bridge Everything',s:'All systems +4 · lowest system +6',special:'bridge'}];
let state,best=+localStorage.getItem('loop_best_v1')||0;
function reset(){state={turn:1,vals:{Energy:50,Industry:50,Research:50,Society:50,Ecology:50},log:[],done:false,ended:false};document.getElementById('endPanel').classList.remove('open');nextEvent(true);render();window.scrollTo({top:0,behavior:'smooth'})}
function clamp(n){return Math.max(0,Math.min(100,Math.round(n)))}
function avg(){return Math.round(names.reduce((a,n)=>a+state.vals[n],0)/names.length)}
function low(){return names.reduce((a,n)=>state.vals[n]<state.vals[a]?n:a,names[0])}
function apply(delta){for(const k in delta)state.vals[k]=clamp(state.vals[k]+delta[k])}
function valuesText(){return names.map(n=>`${n}:${state.vals[n]}`).join(' · ')}
function nextEvent(first){if(first){state.event={t:'The observatory opens. The loop is balanced, but not stable.',d:{}};return}let e=events[(state.turn*7+avg())%events.length];state.event=e;apply(e.d);state.log.unshift(`<b>Turn ${state.turn}</b> — Event: ${e.t}<br><small>${valuesText()}</small>`)}
function actionName(a){return a?a.n:'Unknown action'}
function choose(i){if(state.done)return;let a=actions[i];if(a.special==='stabilize'){names.forEach(n=>state.vals[n]+=state.vals[n]<45?7:-3);names.forEach(n=>state.vals[n]=clamp(state.vals[n]))}else if(a.special==='bridge'){apply({Energy:4,Industry:4,Research:4,Society:4,Ecology:4});state.vals[low()]=clamp(state.vals[low()]+6)}else{apply(a.d)}state.log.unshift(`<b>Turn ${state.turn}</b> — Action: ${actionName(a)}<br><small>${valuesText()}</small>`);if(names.some(n=>state.vals[n]<=0)){end(false);return}if(state.turn>=MAX){end(true);return}state.turn++;nextEvent(false);if(names.some(n=>state.vals[n]<=0)){end(false);return}render()}
function score(){return Math.round(avg()*state.turn+Math.min(...names.map(n=>state.vals[n]))*8)}
function end(win){state.done=true;state.ended=true;let sc=score();if(sc>best){best=sc;localStorage.setItem('loop_best_v1',best)}render();document.getElementById('grade').textContent=win?'◎':'×';document.getElementById('endTitle').textContent=win?'Loop survived':'Loop collapsed';document.getElementById('endText').textContent=win?'You kept the observatory alive for 40 turns. Review the timeline below to see which tradeoffs protected the loop.':'One system hit zero. Review the timeline below to find where the hidden cost compounded.';document.getElementById('finalScore').textContent='Score '+sc;document.getElementById('endPanel').classList.add('open');document.getElementById('decisionPanel').style.display='none';document.getElementById('endPanel').scrollIntoView({behavior:'smooth',block:'start'})}
function render(){document.getElementById('turn').textContent=Math.min(state.turn,MAX)+'/'+MAX;document.getElementById('stability').textContent=avg();document.getElementById('best').textContent=best;document.getElementById('systems').innerHTML=names.map(n=>`<div class="row"><div class="name">${icons[n]} ${n}</div><div class="bar"><div class="fill" style="width:${state.vals[n]}%;background:${state.vals[n]<25?'linear-gradient(90deg,#FF5C5C,#F2B84B)':'linear-gradient(90deg,#38E078,#38A7FF)'}"></div></div><div class="val ${state.vals[n]<25?'warning':''}">${state.vals[n]}</div></div>`).join('');document.getElementById('event').innerHTML='<b>Current pressure:</b> '+state.event.t;document.getElementById('actions').innerHTML=actions.map((a,i)=>`<button class="btn" ${state.done?'disabled':''} onclick="LoopChoose(${i})">${a.n}<small>${a.s}</small></button>`).join('');document.getElementById('log').innerHTML=state.log.join('')||'<div>No actions yet.</div>';if(!state.ended)document.getElementById('decisionPanel').style.display='block'}
function shareRun(){let text=`The Loop — turn ${state.turn}/${MAX}, stability ${avg()}, score ${score()}\nhttps://jaronkbragg7337.github.io/Free-Game-Hub/games/the-loop/`;return navigator.share?navigator.share({text}).catch(()=>{}):navigator.clipboard.writeText(text).catch(()=>{})}
window.LoopChoose=choose;document.getElementById('restart').onclick=reset;document.getElementById('again').onclick=reset;document.getElementById('share').onclick=shareRun;document.getElementById('shareTop').onclick=shareRun;document.getElementById('review').onclick=()=>document.getElementById('timeline').scrollIntoView({behavior:'smooth',block:'start'});reset();
})();
</script>
</body>
</html>
